{% extends "base.html" %}
{% block title %}Display - SRT{% endblock %}
{% block content %}
<h1>Display Settings</h1>

{% if request.args.get('saved') %}
<div class="alert alert-success">Settings saved.</div>
{% endif %}

<form method="post">
  <div class="card">
    <h2>Theme</h2>
    <div class="form-group">
      <label for="theme">Colour Theme</label>
      <select id="theme" name="theme">
        <option value="dark" {% if settings.theme | default('dark') == 'dark' %}selected{% endif %}>Dark Teal</option>
        <option value="amber" {% if settings.theme | default('dark') == 'amber' %}selected{% endif %}>Classic Amber</option>
        <option value="green" {% if settings.theme == 'green' %}selected{% endif %}>Radar Green</option>
        <option value="red" {% if settings.theme == 'red' %}selected{% endif %}>Radar Red</option>
        <option value="yellow" {% if settings.theme == 'yellow' %}selected{% endif %}>Radar Yellow</option>
        <option value="white" {% if settings.theme == 'white' %}selected{% endif %}>Radar White</option>
      </select>
    </div>
  </div>

  <div class="card">
    <h2>Aircraft Icons</h2>
    <div class="form-group">
      <label for="aircraft_icon_set">Icon Set</label>
      <select id="aircraft_icon_set" name="aircraft_icon_set">
        <option value="detailed" {% if settings.aircraft_icon_set | default('detailed') == 'detailed' %}selected{% endif %}>Detailed (per-type SVG icons)</option>
        <option value="simple" {% if settings.aircraft_icon_set == 'simple' %}selected{% endif %}>Simple (hand-drawn shapes)</option>
      </select>
    </div>
  </div>

  <div class="card">
    <h2>Idle Behaviour</h2>
    <div class="form-group">
      <label for="auto_clock_s">Auto-return to clock (seconds, 0 = off)</label>
      <input type="number" id="auto_clock_s" name="auto_clock_s"
             value="{{ settings.auto_clock_s }}" min="0" step="30">
    </div>
  </div>

  <div class="btn-group">
    <button type="submit" class="btn">Save</button>
  </div>
</form>
{% endblock %}
