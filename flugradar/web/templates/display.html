{% extends "base.html" %}
{% block title %}Display - SRT{% endblock %}
{% block content %}
<h1>Display Settings</h1>

{% if request.args.get('saved') %}
<div class="alert alert-success">Settings saved.</div>
{% endif %}

<form method="post">
  <div class="card">
    <h2>Theme</h2>
    <div class="form-group">
      <label for="theme">Colour Theme</label>
      <select id="theme" name="theme">
        <option value="dark" {% if settings.theme | default('dark') == 'dark' %}selected{% endif %}>Dark (Green)</option>
        <option value="amber" {% if settings.theme | default('dark') == 'amber' %}selected{% endif %}>Classic Amber</option>
      </select>
    </div>
  </div>

  <div class="btn-group">
    <button type="submit" class="btn">Save</button>
  </div>
</form>
{% endblock %}
