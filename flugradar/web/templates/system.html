{% extends "base.html" %}
{% block title %}System - SRT{% endblock %}
{% block content %}
<h1>System</h1>

{% if message %}
<div class="alert alert-success">{{ message }}</div>
{% endif %}

<div class="card">
  <h2>Info</h2>
  <table class="info-table">
    <tr><td>Version</td><td>{{ version }}</td></tr>
    <tr><td>Location</td><td>{{ settings.home.lat }}, {{ settings.home.lon }}</td></tr>
    <tr><td>Radius</td><td>{{ settings.home.radius_km }} km</td></tr>
  </table>
</div>

<div class="card">
  <h2>Actions</h2>
  <form method="post" class="btn-group">
    <button type="submit" name="action" value="restart" class="btn">Restart</button>
    <button type="submit" name="action" value="shutdown" class="btn btn-danger">Shutdown</button>
  </form>
</div>
{% endblock %}
