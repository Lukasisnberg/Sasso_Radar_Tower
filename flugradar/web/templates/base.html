<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Sasso Radar Tower{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav>
    <div class="container">
      <a class="brand" href="{{ url_for('index') }}">SRT</a>
      <div class="links">
        <a href="{{ url_for('radar') }}" {% if request.endpoint == 'radar' %}class="active"{% endif %}>Radar</a>
        <a href="{{ url_for('display') }}" {% if request.endpoint == 'display' %}class="active"{% endif %}>Display</a>
        <a href="{{ url_for('api_keys') }}" {% if request.endpoint == 'api_keys' %}class="active"{% endif %}>API Keys</a>
        <a href="{{ url_for('system') }}" {% if request.endpoint == 'system' %}class="active"{% endif %}>System</a>
        <a href="{{ url_for('about') }}" {% if request.endpoint == 'about' %}class="active"{% endif %}>About</a>
      </div>
    </div>
  </nav>

  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <footer>
    Sasso Radar Tower v{{ version | default('?') }} &mdash;
    Data: <a href="https://adsb.fi" target="_blank">adsb.fi</a>
  </footer>
</body>
</html>
